name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Install targets for macOS builds (both Intel and Apple Silicon)
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Frontend Dependencies
        run: bun install

      # --- macOS code signing + notarization ---
      # Activate by adding the following secrets in GitHub → Settings → Secrets and variables → Actions:
      #   APPLE_CERTIFICATE           (base64 of .p12 Developer ID Application cert)
      #   APPLE_CERTIFICATE_PASSWORD  (password for the .p12)
      #   APPLE_SIGNING_IDENTITY      ("Developer ID Application: Name (TEAMID)")
      #   APPLE_ID                    (Apple ID email)
      #   APPLE_ID_PASSWORD           (app-specific password, NOT the Apple ID password)
      #   APPLE_TEAM_ID               (10-char team ID)
      # Then uncomment the block below. See docs/build-release/SIGNING_SETUP.md.
      # - name: Import Apple certificate
      #   if: matrix.platform == 'macos-latest'
      #   uses: apple-actions/import-codesign-certs@v3
      #   with:
      #     p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
      #     p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing (already in place)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing + notarization (opt-in, see block above)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows Authenticode signing (opt-in via certificateThumbprint in tauri.conf.json
          # or by setting WINDOWS_CERTIFICATE + WINDOWS_CERTIFICATE_PASSWORD secrets and
          # updating tauri.conf.json to reference them). See docs/build-release/SIGNING_SETUP.md.
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Volt ${{ github.ref_name }}"
          releaseBody: |
            ## 🚀 Volt ${{ github.ref_name }}

            ### 📥 Installation
            - **Windows**: Télécharger `volt_*_x64-setup.exe` (recommandé) ou `.msi`
            - **macOS Intel**: Télécharger `volt_*_x64.dmg`
            - **macOS Apple Silicon**: Télécharger `volt_*_aarch64.dmg`
            - **Linux**: Télécharger `.deb`, `.AppImage` ou `.rpm`

            ### ✨ Nouveautés
            Voir les commits pour les changements.

            ---
            🔄 Les mises à jour automatiques sont activées !
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # --- Windows: collect artifacts for SignPath signing ---
      - name: Collect Windows artifacts for signing
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          mkdir -p signpath-input
          cp src-tauri/target/release/bundle/nsis/*.exe signpath-input/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/msi/*.msi signpath-input/ 2>/dev/null || true
          echo "Collected artifacts for signing:"
          ls -la signpath-input/

      - name: Upload unsigned artifacts for SignPath
        if: matrix.platform == 'windows-latest'
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: windows-unsigned
          path: signpath-input/

  # --- SignPath code signing (Windows only) ---
  sign-windows:
    needs: publish-tauri
    if: always() && needs.publish-tauri.result != 'cancelled'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Submit signing request to SignPath
        id: sign
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: "Voltlaunchr"
          signing-policy-slug: "release-signing"
          github-artifact-id: ${{ needs.publish-tauri.outputs.artifact-id || '' }}
          wait-for-completion: true
          output-artifact-directory: signpath-output
          wait-for-completion-timeout-in-seconds: 600
        continue-on-error: true

      - name: Upload signed artifacts to release
        if: steps.sign.outcome == 'success'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Signed artifacts:"
          ls -la signpath-output/ 2>/dev/null || echo "No signed output"
          TAG="${GITHUB_REF_NAME}"
          for file in signpath-output/*; do
            if [ -f "$file" ]; then
              BASENAME=$(basename "$file")
              echo "Uploading signed: $BASENAME"
              # Delete unsigned version first, then upload signed
              gh release delete-asset "$TAG" "$BASENAME" --repo "$GITHUB_REPOSITORY" --yes 2>/dev/null || true
              gh release upload "$TAG" "$file" --repo "$GITHUB_REPOSITORY" --clobber
            fi
          done

      - name: Report signing status
        if: always()
        run: |
          if [ "${{ steps.sign.outcome }}" == "success" ]; then
            echo "SignPath signing completed successfully"
          else
            echo "SignPath signing skipped or failed (non-blocking). Unsigned artifacts remain in the release."
            echo "This is expected if SignPath Foundation approval is still pending."
          fi
