name: Release

# Triggered by pushing a semver tag (v*.*.*) or manual dispatch.
# Flow: dev → PR → main → tag → this workflow → build + release draft
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Tag to release (e.g. v0.0.6)"
        required: true

# Cancel any in-progress release for the same tag
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

env:
  # Resolve version once — available in all jobs
  TAG: ${{ inputs.version || github.ref_name }}

jobs:
  # ---------------------------------------------------------------------------
  # Compose release notes once (Linux-only, git-cliff is Docker-based). The
  # result is consumed by every matrix job via needs.*.outputs.body.
  # ---------------------------------------------------------------------------
  prepare-notes:
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.body.outputs.body }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes (git-cliff)
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Compose release body
        id: body
        shell: bash
        run: |
          {
            echo "body<<RELEASE_BODY_EOF"
            echo "## Volt ${{ env.TAG }}"
            echo ""
            if [ -s RELEASE_NOTES.md ]; then
              cat RELEASE_NOTES.md
              echo ""
            fi
            cat <<'FOOTER'
          ---

          ### Installation
          | Platform | Download |
          |---|---|
          | **Windows** | `volt_*_x64-setup.exe` (recommended) or `.msi` |
          | **macOS Intel** | `volt_*_x64.dmg` |
          | **macOS Apple Silicon** | `volt_*_aarch64.dmg` |
          | **Linux** | `.deb`, `.AppImage` or `.rpm` |

          Full changelog: [CHANGELOG.md](https://github.com/VoltLaunchr/Volt/blob/main/CHANGELOG.md)

          Auto-updates are enabled for existing installs.
          FOOTER
            echo "RELEASE_BODY_EOF"
          } >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Build on all 4 platform targets
  # ---------------------------------------------------------------------------
  publish-tauri:
    needs: prepare-notes
    outputs:
      artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Frontend Dependencies
        run: bun install

      - name: Frontend Tests (Vitest)
        run: bun run test

      - name: Rust Tests
        run: cd src-tauri && cargo test --workspace --lib

      # --- macOS code signing (opt-in) ---
      # Only attempt if APPLE_CERTIFICATE secret is a valid base64 string (>100 chars).
      # Empty or placeholder values are ignored.
      - name: Import Apple certificate
        if: matrix.platform == 'macos-latest' && env.APPLE_CERT != ''
        uses: apple-actions/import-codesign-certs@v3
        env:
          APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE }}
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        continue-on-error: true

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Supabase — required at compile time by build.rs
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          # Updater signing
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing — use ad-hoc signing ("-") when no Apple certificate is configured
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_CERTIFICATE != '' && secrets.APPLE_SIGNING_IDENTITY || '-' }}
          APPLE_ID: ${{ secrets.APPLE_CERTIFICATE != '' && secrets.APPLE_ID || '' }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_CERTIFICATE != '' && secrets.APPLE_ID_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_CERTIFICATE != '' && secrets.APPLE_TEAM_ID || '' }}
        with:
          tagName: ${{ env.TAG }}
          releaseName: "Volt ${{ env.TAG }}"
          releaseBody: ${{ needs.prepare-notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # --- Windows: collect artifacts for SignPath ---
      - name: Collect Windows artifacts for signing
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          mkdir -p signpath-input
          cp src-tauri/target/release/bundle/nsis/*.exe signpath-input/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/msi/*.msi signpath-input/ 2>/dev/null || true
          echo "Collected artifacts for signing:"
          ls -la signpath-input/

      - name: Upload unsigned artifacts for SignPath
        if: matrix.platform == 'windows-latest'
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: windows-unsigned
          path: signpath-input/

  # ---------------------------------------------------------------------------
  # SignPath code signing (Windows, non-blocking)
  # ---------------------------------------------------------------------------
  sign-windows:
    needs: publish-tauri
    if: always() && needs.publish-tauri.result != 'cancelled'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Submit signing request to SignPath
        id: sign
        if: env.SIGNPATH_TOKEN != ''
        uses: signpath/github-action-submit-signing-request@v1
        env:
          SIGNPATH_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: "Voltlaunchr"
          signing-policy-slug: "release-signing"
          github-artifact-id: ${{ needs.publish-tauri.outputs.artifact-id || '' }}
          wait-for-completion: true
          output-artifact-directory: signpath-output
          wait-for-completion-timeout-in-seconds: 600
        continue-on-error: true

      - name: Upload signed artifacts to release
        if: steps.sign.outcome == 'success'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Signed artifacts:"
          ls -la signpath-output/ 2>/dev/null || echo "No signed output"
          for file in signpath-output/*; do
            if [ -f "$file" ]; then
              BASENAME=$(basename "$file")
              echo "Uploading signed: $BASENAME"
              gh release delete-asset "${{ env.TAG }}" "$BASENAME" --repo "$GITHUB_REPOSITORY" --yes 2>/dev/null || true
              gh release upload "${{ env.TAG }}" "$file" --repo "$GITHUB_REPOSITORY" --clobber
            fi
          done

      - name: Report signing status
        if: always()
        run: |
          if [ "${{ steps.sign.outcome }}" == "success" ]; then
            echo "::notice::SignPath signing completed successfully"
          elif [ "${{ steps.sign.outcome }}" == "skipped" ]; then
            echo "::notice::SignPath signing skipped (SIGNPATH_API_TOKEN not configured for this environment)"
          else
            # Signing was attempted but failed. Fail the workflow so unsigned
            # binaries do not silently ship as if they were signed. Maintainers
            # should either remove the unsigned release assets or re-run signing.
            echo "::error::SignPath signing FAILED. Unsigned artifacts still exist on the release — remove them or re-run the sign-windows job before announcing the release."
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Winget submission (only for stable releases, non-blocking)
  # ---------------------------------------------------------------------------
  update-winget:
    needs: publish-tauri
    if: needs.publish-tauri.result == 'success'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VERSION="${{ env.TAG }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Wait for release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Waiting for Windows installer in release ${{ env.TAG }}..."
          for i in $(seq 1 30); do
            if gh release view "${{ env.TAG }}" --json assets -q '.assets[].name' | grep -q "x64-setup.exe"; then
              echo "Installer found!"
              exit 0
            fi
            echo "Attempt $i/30 — waiting 30s..."
            sleep 30
          done
          echo "Installer not found after 15 minutes"
          exit 1

      - name: Install wingetcreate
        if: env.HAS_WINGET_PAT != ''
        env:
          HAS_WINGET_PAT: ${{ secrets.WINGET_GH_PAT }}
        shell: pwsh
        run: |
          $wingetcreateVersion = "v1.6.5491"
          $url = "https://github.com/microsoft/winget-create/releases/download/${wingetcreateVersion}/wingetcreate.exe"
          Invoke-WebRequest -Uri $url -OutFile wingetcreate.exe -UseBasicParsing

      - name: Submit to winget-pkgs
        if: env.HAS_WINGET_PAT != ''
        shell: pwsh
        env:
          HAS_WINGET_PAT: ${{ secrets.WINGET_GH_PAT }}
          WINGET_GH_PAT: ${{ secrets.WINGET_GH_PAT }}
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $url = "https://github.com/VoltLaunchr/Volt/releases/download/${{ env.TAG }}/volt_${version}_x64-setup.exe"
          Write-Host "Submitting VoltLaunchr.Volt v${version} to winget-pkgs..."
          .\wingetcreate.exe update VoltLaunchr.Volt --version $version --urls $url --submit --token $env:WINGET_GH_PAT
        continue-on-error: true
