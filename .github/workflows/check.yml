name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  check:
    name: Check & Build
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies (Linux dependencies for Tauri)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Frontend Dependencies
        run: bun install

      - name: Lint
        run: bunx eslint .

      - name: Build Frontend & Check Types
        run: bun run build

      - name: Frontend Tests (Vitest)
        run: bun run test

      - name: Rust Format Check
        run: cd src-tauri && cargo fmt --check

      - name: Rust Clippy
        run: cd src-tauri && cargo clippy --all-features --all-targets -- -D warnings

      - name: Check Rust Backend (Fast)
        run: cd src-tauri && cargo check --all-features

      - name: Rust Tests
        run: cd src-tauri && cargo test --workspace --lib
